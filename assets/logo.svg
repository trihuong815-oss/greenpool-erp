<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background circle -->
  <circle cx="200" cy="200" r="198" fill="white"/>

  <!-- Open green "G/E" shape: Outer arc with gap on the right -->
  <path d="M 200 70
           A 130 130 0 1 0 320 240
           L 295 222
           A 105 105 0 1 1 200 95
           Z"
        fill="#7AC142"/>

  <!-- 3 cyan wavy lines cutting through the G (upper portion) -->
  <path d="M 90 175 C 130 165, 170 175, 210 168 S 280 160, 320 170"
        stroke="#1AB5C9" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 80 200 C 120 190, 160 200, 200 193 S 270 185, 320 195"
        stroke="#1AB5C9" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 90 225 C 130 215, 170 225, 210 218 S 280 210, 315 218"
        stroke="#1AB5C9" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Green plant: stem -->
  <path d="M 245 320 Q 245 290, 250 270 Q 255 245, 265 220"
        stroke="#5BA122" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Big leaf on top-right (pointing up-right) -->
  <path d="M 265 220
           Q 285 175, 330 165
           Q 340 200, 320 235
           Q 290 250, 265 220 Z"
        fill="#7AC142"/>
  <!-- Vein on big leaf -->
  <path d="M 270 220 Q 295 200, 325 180" stroke="#5BA122" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Middle leaf on left -->
  <path d="M 245 260
           Q 215 250, 200 270
           Q 215 295, 245 285
           Q 252 273, 245 260 Z"
        fill="#7AC142"/>
  <!-- Vein on middle leaf -->
  <path d="M 245 268 Q 225 270, 210 282" stroke="#5BA122" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Small leaf bottom-left -->
  <path d="M 250 295
           Q 225 295, 215 315
           Q 235 325, 252 312
           Q 256 303, 250 295 Z"
        fill="#7AC142"/>

  <!-- Water waves at the bottom -->
  <path d="M 100 310 C 130 300, 170 320, 200 312 S 270 304, 310 314"
        stroke="#1AB5C9" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 90 330 C 130 320, 170 340, 210 332 S 280 322, 325 332"
        stroke="#1AB5C9" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 110 350 C 140 342, 180 356, 215 350 S 270 342, 305 350"
        stroke="#1AB5C9" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
