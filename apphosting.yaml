# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Secrets (FIREBASE_PRIVATE_KEY, GEMINI_API_KEY...) lưu trong Google Cloud Secret Manager
# rồi reference qua `secret:` field. Xem hướng dẫn bên dưới để upload secret.

runConfig:
  # Min instances 0 = scale-to-zero (free tier friendly), không tốn tiền khi idle.
  # Tăng lên 1 nếu cần cold-start fast (charge ~$0.5/month per instance).
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # ─── Public env (commit-safe — không nhạy cảm) ───
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: green-pool-system
    availability:
      - BUILD
      - RUNTIME

  # ─── Firebase Admin (server) — projectId + clientEmail không nhạy cảm ───
  - variable: FIREBASE_PROJECT_ID
    value: green-pool-system
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@green-pool-system.iam.gserviceaccount.com
    availability:
      - RUNTIME

  # ─── Secrets — đẩy vào Cloud Secret Manager ───
  # Tạo secret bằng lệnh (xem README đính kèm):
  #   firebase apphosting:secrets:set FIREBASE_PRIVATE_KEY
  #   firebase apphosting:secrets:set GEMINI_API_KEY
  #   firebase apphosting:secrets:set NEXT_PUBLIC_FIREBASE_API_KEY
  #   ... (các key khác)

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  # ─── FCM Push Notifications (Phase: cong-viec-ca-nhan) ───
  # NEXT_PUBLIC_FCM_VAPID_KEY: lấy từ Firebase Console → Cloud Messaging → Web Push certificates
  # CRON_SECRET: random string ≥32 ký tự — GitHub Actions dùng để auth cron endpoints
  - variable: NEXT_PUBLIC_FCM_VAPID_KEY
    secret: NEXT_PUBLIC_FCM_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
