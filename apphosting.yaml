# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Secrets luu trong Google Cloud Secret Manager roi reference qua secret field.
# Khong dua gia tri secret that vao file nay.

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: green-pool-system
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: green-pool-system
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@green-pool-system.iam.gserviceaccount.com
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FCM_VAPID_KEY
    secret: NEXT_PUBLIC_FCM_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  - variable: MONTHLY_SUMMARY_CRON_SECRET
    secret: MONTHLY_SUMMARY_CRON_SECRET
    availability:
      - RUNTIME
