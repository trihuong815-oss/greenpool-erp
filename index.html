<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Pool ERP — Hệ thống Quản lý Nội bộ</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="./assets/data.js"></script>
<link rel="stylesheet" href="./assets/style.css">
</head>
<body class="bg-slate-50 antialiased">

<!-- =========== LOGIN SCREEN =========== -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <img src="./assets/logo.png" onerror="this.onerror=null;this.src='./assets/logo.svg'" alt="Green Pool" class="w-24 h-24 mx-auto mb-3 drop-shadow-lg">
      <h1 class="text-3xl font-bold text-slate-800">Green Pool ERP</h1>
      <p class="text-slate-500 mt-2">Hệ thống Quản lý Nội bộ — Cụm 5 cơ sở</p>
    </div>

    <form onsubmit="event.preventDefault(); login();" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" id="email" value="ceo@greenpool.vn" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
        <input type="password" id="password" value="demo123" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Đăng nhập với vai trò (demo)</label>
        <select id="role-selector" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <optgroup label="Tầng 1 — CEO">
            <option value="CEO">CEO / Chủ đầu tư</option>
          </optgroup>
          <optgroup label="Tầng 2 — Giám đốc Khối">
            <option value="GD_KD">GĐ Khối Kinh doanh</option>
            <option value="GD_VP">GĐ Khối Văn phòng</option>
          </optgroup>
          <optgroup label="Tầng 3 — Quản lý Cơ sở">
            <option value="QLCS_HM">Quản lý CS Hoàng Mai</option>
            <option value="QLCS_TK">Quản lý CS Thuỵ Khuê</option>
            <option value="QLCS_CTT">Quản lý CS Cung Thể Thao</option>
            <option value="QLCS_24NCT">Quản lý CS 24 NCT</option>
            <option value="QLCS_TT">Quản lý CS Thanh Trì</option>
          </optgroup>
          <optgroup label="Tầng 3 — Trưởng phòng KD">
            <option value="TP_KT">TP Kỹ thuật</option>
            <option value="TP_DT">TP Đào tạo</option>
            <option value="TP_MKT">TP Marketing</option>
            <option value="TIBAN_TT">Tiểu ban Truyền thông NB</option>
          </optgroup>
          <optgroup label="Tầng 3 — Trưởng phòng VP">
            <option value="TP_GS">TP Giám sát</option>
            <option value="TP_KE">TP Kế toán</option>
            <option value="TP_NS">TP Nhân sự</option>
          </optgroup>
          <optgroup label="Tầng 4-5 — Nhân viên">
            <option value="TT_DT">Tổ trưởng Đào tạo CS</option>
            <option value="GV_CB">Giáo viên cơ bản</option>
            <option value="NV_SALE">NV Kinh doanh/Sale</option>
            <option value="NV_CH">NV Cứu hộ</option>
          </optgroup>
        </select>
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-blue-700 to-blue-900 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all">
        Đăng nhập
      </button>
    </form>

    <div class="mt-6 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
      <strong>Demo mode:</strong> Đây là prototype để xem giao diện. Trong app thật, mỗi user chỉ thấy phần dữ liệu thuộc thẩm quyền của mình.
    </div>
  </div>
</div>

<!-- =========== MAIN APP =========== -->
<div id="app" class="hidden min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col">
    <div class="p-4 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <img src="./assets/logo.png" onerror="this.onerror=null;this.src='./assets/logo.svg'" alt="Green Pool" class="w-10 h-10 bg-white rounded-lg p-0.5">
        <div>
          <div class="font-bold text-sm">Green Pool</div>
          <div class="text-xs text-slate-400">ERP v1.0</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <button onclick="navigate('dashboard')" data-route="dashboard" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </button>
      <button onclick="navigate('doanh-so')" data-route="doanh-so" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Doanh số
      </button>
      <button onclick="navigate('checklist')" data-route="checklist" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Checklist vận hành
      </button>
      <button onclick="navigate('quy-trinh')" data-route="quy-trinh" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Quy trình vận hành phòng ban
      </button>
      <button onclick="navigate('giao-viec')" data-route="giao-viec" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Đề xuất · Nhiệm vụ · Giao việc
      </button>
      <button onclick="navigate('sodo')" data-route="sodo" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Sơ đồ tổ chức
      </button>
      <button onclick="navigate('luong')" data-route="luong" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Lương 3P & KPI
      </button>
      <button onclick="navigate('bao-cao')" data-route="bao-cao" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Báo cáo tự động
      </button>
      <button onclick="navigate('daotao')" data-route="daotao" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
        Đào tạo (API)
      </button>
      <button onclick="navigate('mkt')" data-route="mkt" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
        Marketing (API)
      </button>

      <div class="my-3 border-t border-slate-700"></div>

      <button onclick="navigate('settings-packages')" data-route="settings-packages" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm hover:bg-slate-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Quản lý gói dịch vụ
      </button>
    </nav>

    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 p-2 rounded-lg bg-slate-800">
        <div id="user-avatar" class="w-9 h-9 rounded-full bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-sm font-bold"></div>
        <div class="flex-1 min-w-0">
          <div id="user-name" class="text-sm font-medium truncate"></div>
          <div id="user-role" class="text-xs text-slate-400 truncate"></div>
        </div>
        <button onclick="logout()" title="Đăng xuất" class="text-slate-400 hover:text-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
      <div>
        <h2 id="page-title" class="text-xl font-bold text-slate-800">Dashboard</h2>
        <p id="page-subtitle" class="text-xs text-slate-500"></p>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <div class="text-xs text-slate-500">Hôm nay</div>
          <div id="today-date" class="text-sm font-medium text-slate-700"></div>
        </div>
        <div class="relative">
          <button onclick="toggleNotifications()" class="relative p-2 rounded-lg hover:bg-slate-100">
            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span id="notif-count" class="hidden absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 bg-red-500 text-white rounded-full text-[10px] font-bold flex items-center justify-center"></span>
          </button>
          <div id="notif-dropdown" class="hidden absolute right-0 top-full mt-2 w-96 bg-white border border-slate-200 shadow-xl rounded-xl z-50 max-h-[500px] flex flex-col">
            <div class="p-3 border-b border-slate-100 flex items-center justify-between">
              <div class="font-bold text-slate-800">Thông báo</div>
              <button onclick="markAllNotificationsRead()" class="text-xs text-blue-700 hover:underline">Đánh dấu đã đọc</button>
            </div>
            <div id="notif-list" class="flex-1 overflow-y-auto">
              <!-- Notifications populated by JS -->
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <div id="page-content" class="flex-1 overflow-y-auto p-6 bg-slate-50">
      <!-- Content loaded dynamically -->
    </div>
  </main>
</div>

<script src="./assets/app.js"></script>
</body>
</html>
