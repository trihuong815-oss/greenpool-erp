name: Cron — Push notifications (reminders + morning + evening)

# Reminders: mỗi 5 phút (GitHub Actions min interval).
# Morning summary: 00:00 UTC = 07:00 Vietnam.
# Evening summary: 13:00 UTC = 20:00 Vietnam.
on:
  schedule:
    - cron: '*/5 * * * *'    # reminders mỗi 5 phút
    - cron: '0 0 * * *'      # morning summary 07:00 VN
    - cron: '0 13 * * *'     # evening summary 20:00 VN
    - cron: '0 * * * *'      # cleanup-checklists mỗi giờ
    # Phase Checklist-Reminder (2026-06-09): nhắc QLCS/PP nếu chưa submit
    # 1 tiếng sau deadline mỗi shift.
    - cron: '0 1 * * *'      # checklist morning: deadline 07:00 VN → reminder 08:00 VN = 01:00 UTC
    - cron: '30 7 * * *'     # checklist afternoon: deadline 13:30 VN → reminder 14:30 VN = 07:30 UTC
    - cron: '30 15 * * *'    # checklist evening: deadline 21:30 VN → reminder 22:30 VN = 15:30 UTC
    # V6.5 (2026-06-14): cleanup FCM token stale >7 ngày — daily 03:00 UTC = 10:00 VN
    - cron: '0 3 * * *'      # cleanup-stale-fcm daily
    # V6.5 Phase A (2026-06-14): retry failed FCM push — chia tải với send-reminders (đã chạy */5)
    # V6.5 Phase B (2026-06-14): SLA + escalation + stuck — hourly
    - cron: '15 * * * *'     # proposal-overdue mỗi giờ (offset 15p để tránh cùng */5)
    - cron: '30 * * * *'     # dispatch-overdue mỗi giờ (offset 30p)
    - cron: '45 * * * *'     # action-required-stuck mỗi giờ (offset 45p)
    # V6.5 Audit Phase D.1 (2026-06-15): proposal stale recipient cleanup — hourly
    - cron: '50 * * * *'     # proposal-stale-recipient mỗi giờ (offset 50p)
  workflow_dispatch:          # manual trigger để test

# Concurrency: cancel runs cũ nếu chậm — tránh chồng chéo
concurrency:
  group: cron-reminders-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  send-reminders:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call send-reminders endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"
          cat /tmp/body
          if [ "$response" -ne 200 ]; then
            echo "::error::Reminders cron failed with status $response"
            exit 1
          fi

  # V6.5 Phase A (2026-06-14): retry FCM push fail (every 5min, max 3 lần, backoff 5p/15p/30p)
  retry-failed-push:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call retry-failed-push
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/retry-failed-push" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  send-morning-summary:
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call send-morning-summary endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/send-morning-summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"
          cat /tmp/body
          if [ "$response" -ne 200 ]; then
            echo "::error::Morning summary cron failed with status $response"
            exit 1
          fi

  send-evening-summary:
    if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call send-evening-summary endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/send-evening-summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"
          cat /tmp/body
          if [ "$response" -ne 200 ]; then
            echo "::error::Evening summary cron failed with status $response"
            exit 1
          fi

  cleanup-checklists:
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call cleanup-checklists endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/cleanup-checklists" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"
          cat /tmp/body
          if [ "$response" -ne 200 ]; then
            echo "::error::Cleanup checklists cron failed with status $response"
            exit 1
          fi

  checklist-reminder-morning:
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call checklist-reminder?shift=morning
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/checklist-reminder?shift=morning" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  checklist-reminder-afternoon:
    if: github.event.schedule == '30 7 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call checklist-reminder?shift=afternoon
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/checklist-reminder?shift=afternoon" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  checklist-reminder-evening:
    if: github.event.schedule == '30 15 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call checklist-reminder?shift=evening
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/checklist-reminder?shift=evening" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  cleanup-stale-fcm:
    # V6.5 (2026-06-14): daily 10:00 VN — xóa token lastSeen >7 ngày
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call cleanup-stale-fcm
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/cleanup-stale-fcm" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  # V6.5 Phase B (2026-06-14): SLA monitoring đề xuất pending_approval — hourly
  proposal-overdue:
    if: github.event.schedule == '15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call proposal-overdue
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/proposal-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  # V6.5 Phase B (2026-06-14): điều phối quá hạn + escalation GĐ khối — hourly
  dispatch-overdue:
    if: github.event.schedule == '30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call dispatch-overdue
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/dispatch-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  # V6.5 Phase B (2026-06-14): action_required >24h chưa xử lý → resend noti — hourly
  action-required-stuck:
    if: github.event.schedule == '45 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call action-required-stuck
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/action-required-stuck" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi

  # V6.5 Audit Phase D.1 (2026-06-15): proposal stale recipient cleanup — hourly
  proposal-stale-recipient:
    if: github.event.schedule == '50 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call proposal-stale-recipient
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "${{ secrets.APP_HOSTING_URL }}/api/cron/proposal-stale-recipient" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json")
          echo "Status: $response"; cat /tmp/body
          if [ "$response" -ne 200 ]; then exit 1; fi
