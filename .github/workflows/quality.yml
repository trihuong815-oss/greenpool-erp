# Phase A.6 (2026-06-07): CI gate quality check.
# Chạy trên mọi PR + push main → block merge khi fail.
# - TypeScript strict check
# - Next.js production build
# - (Future) Vitest tests
# - (Future) Firestore rules unit test

name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel run cũ khi push commit mới (tiết kiệm CI minute)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - run: npx tsc --noEmit
        env:
          # TS không cần env runtime, nhưng để chắc
          NODE_ENV: production

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - name: Build with placeholder env (verify code compiles, không deploy)
        run: npx next build
        env:
          # Placeholder values — chỉ verify build pass, không runtime test
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:000000000000000000'
          NEXT_PUBLIC_FCM_VAPID_KEY: ci-placeholder
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_CLIENT_EMAIL: ci@ci-placeholder.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
          CRON_SECRET: ci-placeholder
          GEMINI_API_KEY: ci-placeholder

  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - run: npm test

  rules-syntax:
    name: Firestore Rules Compile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y firebase-tools@latest --version
      - name: Validate Firestore rules syntax
        # firebase deploy --dry-run cần auth → chỉ check syntax cơ bản bằng grep
        run: |
          # Verify rules file tồn tại
          test -f firebase/firestore.rules
          test -f firebase/storage.rules
          # Verify braces balanced
          grep -c "^service" firebase/firestore.rules
          grep -c "^service" firebase/storage.rules
          echo "✓ Rules files present and start with service block"
